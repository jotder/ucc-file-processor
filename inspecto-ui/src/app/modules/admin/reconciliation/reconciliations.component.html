<div class="flex min-w-0 flex-auto flex-col p-6 sm:p-8">
    <div class="mb-6 flex flex-wrap items-center justify-between gap-y-3">
        <div>
            <h1 class="text-2xl font-semibold tracking-tight">Reconciliation</h1>
            <div class="text-secondary mt-1 text-sm">Match a dataset against another by key, within tolerance — then drill the breaks</div>
        </div>
        <div class="flex items-center gap-3">
            <button mat-icon-button (click)="load()" [disabled]="loading()" aria-label="Refresh">
                <mat-icon svgIcon="heroicons_outline:arrow-path"></mat-icon>
            </button>
            <button mat-flat-button color="primary" (click)="create()">
                <mat-icon svgIcon="heroicons_outline:plus"></mat-icon>
                <span class="ml-2">New reconciliation</span>
            </button>
        </div>
    </div>

    @if (!loading() && reconciliations().length === 0) {
        <inspecto-empty-state
            icon="heroicons_outline:scale"
            title="No reconciliations yet"
            message="Define a dataset-vs-dataset match (keys + tolerances) to surface breaks."
        />
    } @else {
        <inspecto-data-table
            tier="standard"
            sourceName="reconciliations"
            exportName="reconciliations"
            [rows]="reconciliations()"
            [columns]="columns"
            [rowActions]="rowActions"
            [loading]="loading()"
            [autoHeight]="true"
            (rowClick)="open($any($event))"
        />
    }
</div>
