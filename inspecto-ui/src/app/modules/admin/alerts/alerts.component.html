<div class="flex min-w-0 flex-auto flex-col p-6 md:p-8">
    <!-- Header -->
    <div class="flex items-center justify-between">
        <div>
            <h1 class="text-3xl font-extrabold leading-tight tracking-tight">Alerts</h1>
            <div class="text-secondary mt-1">
                Fired alert-rule breaches over the batch ledger — an Alert Rule watches a Metric
                against a threshold and fires when it crosses.
            </div>
        </div>
        <div class="flex items-center gap-3">
            @if (loading || evaluating) {
                <mat-spinner diameter="24"></mat-spinner>
            }
            <button mat-stroked-button (click)="evaluate()" [disabled]="evaluating">
                Evaluate now
            </button>
            <button mat-icon-button (click)="load()" [disabled]="loading" aria-label="Refresh">
                <mat-icon [svgIcon]="'heroicons_outline:arrow-path'"></mat-icon>
            </button>
        </div>
    </div>

    <!-- Fired alerts grid -->
    <div class="mt-4 flex-auto">
        <inspecto-data-table
            tier="pro"
            sourceName="alerts"
            exportName="alerts"
            [rows]="alerts"
            [columns]="columnDefs"
            [loading]="loading"
            noRowsTitle="No alerts fired"
            noRowsHint="Breaches of the armed alert rules will appear here."
        />
    </div>

    <!-- Armed rules: the authoring section (audit C3) -->
    <div class="mt-8 flex items-center justify-between">
        <h2 class="text-xl font-semibold tracking-tight">Alert Rules</h2>
        @if (lens.canAuthorAlertRules()) {
            <button mat-flat-button color="primary" (click)="newRule()">
                <mat-icon svgIcon="heroicons_outline:plus"></mat-icon>
                <span class="ml-2">New rule</span>
            </button>
        }
    </div>
    <div class="mt-3">
        <inspecto-data-table
            tier="mini"
            sourceName="alert-rules"
            [rows]="rules"
            [columns]="ruleColumnDefs"
            [rowActions]="ruleActions"
            [autoHeight]="true"
            noRowsTitle="No alert rules armed"
            noRowsHint="Create a rule to watch a Metric against a threshold — breaches appear above as Alerts."
        />
    </div>
</div>
