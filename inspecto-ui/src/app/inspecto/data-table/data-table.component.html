@if (hasToolbar()) {
    <div class="mb-2 flex flex-wrap items-center gap-1">
        @if (showSearch()) {
            <button mat-icon-button type="button" (click)="toggleSearch()" [class.text-primary]="searchOpen()"
                    matTooltip="Search rows" aria-label="Search rows">
                <mat-icon class="icon-size-5" svgIcon="heroicons_outline:magnifying-glass"></mat-icon>
            </button>
            @if (searchOpen()) {
                <mat-form-field subscriptSizing="dynamic" class="w-56">
                    <input matInput [value]="search()" (input)="search.set($any($event.target).value)"
                           placeholder="Search rows" aria-label="Search rows" />
                </mat-form-field>
            }
        }

        <span class="flex-1"></span>

        @if (showColumns()) {
            <inspecto-column-chooser
                [columns]="allFields()"
                [selected]="chosen() ?? allFields()"
                [label]="canQuery() ? 'Choose columns (SELECT)' : 'Show / hide columns'"
                (selectedChange)="onChosen($event)"
            />
        }

        @if (canQuery()) {
            <button mat-icon-button type="button" (click)="toggleFilter()" [class.text-primary]="filterOpen()"
                    matTooltip="Filter builder" aria-label="Filter builder">
                <mat-icon class="icon-size-5" svgIcon="heroicons_outline:funnel"></mat-icon>
            </button>
        }

        @if (showSave()) {
            <button mat-icon-button type="button" (click)="onSaveRule()"
                    matTooltip="Save as rule" aria-label="Save query as a rule template">
                <mat-icon class="icon-size-5" svgIcon="heroicons_outline:bookmark-square"></mat-icon>
            </button>
        }

        @if (showExport()) {
            <button mat-icon-button type="button" (click)="exportCsv()"
                    matTooltip="Export CSV" aria-label="Export rows to CSV">
                <mat-icon class="icon-size-5" svgIcon="heroicons_outline:arrow-down-tray"></mat-icon>
            </button>
        }
    </div>
}

@if (canQuery()) {
    <!-- Pro / Pro Max: the SQL editor is shown by default; the filter builder toggles in on demand. -->
    <div class="mb-3 space-y-3">
        @defer (when canQuery()) {
            <inspecto-sql-editor
                [sql]="generatedSql()"
                [sourceName]="sourceName()"
                [running]="running()"
                [error]="proError()"
                (sqlChange)="currentSql.set($event)"
                (run)="onRunSql($event)"
            />
        } @placeholder {
            <div class="text-secondary rounded-lg border p-3 text-sm" style="border-color: var(--gamma-border)">
                Loading SQL editor…
            </div>
        }

        @if (filterOpen()) {
            <div class="rounded-lg border p-3" style="border-color: var(--gamma-border)">
                <div class="mb-1 text-xs font-semibold uppercase tracking-wider opacity-60">Filter builder</div>
                <inspecto-query-condition-group
                    [group]="where()"
                    [columns]="columnsCache()"
                    [root]="true"
                    (changed)="onWhereChanged()"
                />
            </div>
        }
    </div>
}

<ag-grid-angular
    class="w-full"
    [style.height]="autoHeight() ? null : height()"
    [domLayout]="autoHeight() ? 'autoHeight' : 'normal'"
    [theme]="gridTheme.theme()"
    [rowData]="displayRows()"
    [columnDefs]="gridColumns()"
    [defaultColDef]="defaultColDef()"
    [quickFilterText]="search()"
    [pagination]="true"
    [paginationPageSize]="pageSize()"
    [rowSelection]="singleSelect() ? 'single' : undefined"
    [loading]="loading()"
    [overlayNoRowsTemplate]="noRows()"
    (rowClicked)="onRowClicked($event)"
    (firstDataRendered)="refresh($event)"
    (rowDataUpdated)="refresh($event)"
></ag-grid-angular>
