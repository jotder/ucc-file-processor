<div class="rounded-lg border" style="border-color: var(--gamma-border)">
    <!-- Toolbar -->
    <div class="flex items-center gap-1 border-b px-2 py-1" style="border-color: var(--gamma-border)">
        <span class="text-xs font-semibold uppercase tracking-wider opacity-60">SQL</span>
        <span class="flex-1"></span>

        <!-- History + favorites menu -->
        <button mat-icon-button type="button" [matMenuTriggerFor]="histMenu"
                matTooltip="History & favorites" aria-label="Query history and favorites">
            <mat-icon class="icon-size-5" svgIcon="heroicons_outline:clock"></mat-icon>
        </button>
        <mat-menu #histMenu="matMenu">
            <div class="min-w-80 max-w-lg">
                @if (favorites().length) {
                    <div class="px-3 pt-2 text-xs font-semibold uppercase tracking-wider opacity-60">Favorites</div>
                    @for (q of favorites(); track q) {
                        <button mat-menu-item type="button" class="!h-auto !py-1" (click)="select(q)">
                            <mat-icon class="icon-size-4 text-primary" svgIcon="heroicons_solid:star"></mat-icon>
                            <span class="block truncate font-mono text-xs">{{ oneLine(q) }}</span>
                        </button>
                    }
                }
                @if (recent().length) {
                    <div class="px-3 pt-2 text-xs font-semibold uppercase tracking-wider opacity-60">Recent</div>
                    @for (q of recent(); track q) {
                        <button mat-menu-item type="button" class="!h-auto !py-1" (click)="select(q)">
                            <mat-icon class="icon-size-4 opacity-60" svgIcon="heroicons_outline:clock"></mat-icon>
                            <span class="block truncate font-mono text-xs">{{ oneLine(q) }}</span>
                        </button>
                    }
                } @else if (!favorites().length) {
                    <div class="text-secondary px-3 py-3 text-sm">No history yet — Run a query to populate it.</div>
                }
            </div>
        </mat-menu>

        <!-- Favorite toggle -->
        <button mat-icon-button type="button" (click)="toggleFavorite()" [class.text-primary]="isFavorite()"
                [matTooltip]="isFavorite() ? 'Remove from favorites' : 'Save to favorites'"
                [attr.aria-label]="isFavorite() ? 'Remove current query from favorites' : 'Save current query to favorites'">
            <mat-icon class="icon-size-5" [svgIcon]="isFavorite() ? 'heroicons_solid:star' : 'heroicons_outline:star'"></mat-icon>
        </button>

        <!-- Run on server (opt-in): full dataset via the host's backend query -->
        @if (serverRun()) {
            <button mat-stroked-button type="button" class="ml-1" (click)="onRunBackend()" [disabled]="running()"
                    matTooltip="Run on the server over the full dataset">
                <mat-icon class="icon-size-5" svgIcon="heroicons_outline:circle-stack"></mat-icon>
                <span class="ml-1">Run on server</span>
            </button>
        }

        <!-- Run (client-side, over the rows already loaded) -->
        <button mat-flat-button color="primary" type="button" class="ml-1" (click)="onRun()" [disabled]="running()"
                matTooltip="Run over the loaded rows and render the results">
            @if (running()) {
                <mat-spinner diameter="16" class="mr-2"></mat-spinner>
            } @else {
                <mat-icon class="icon-size-5" svgIcon="heroicons_outline:play"></mat-icon>
            }
            <span class="ml-1">Run</span>
        </button>
    </div>

    <inspecto-sql-codemirror [value]="draft()" (valueChange)="onDraft($event)" />

    @if (error()) {
        <inspecto-alert class="m-2 block" variant="error" icon="heroicons_outline:exclamation-triangle">
            {{ error() }}
        </inspecto-alert>
    }
</div>
