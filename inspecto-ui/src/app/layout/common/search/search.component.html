<!-- Bar search -->
@if (appearance === 'bar') {
    @if (!opened) {
        <button mat-icon-button aria-label="Search" (click)="open()">
            <mat-icon [svgIcon]="'heroicons_outline:magnifying-glass'"></mat-icon>
        </button>
    }
    @if (opened) {
        <div class="bg-card absolute inset-0 z-99 flex shrink-0 items-center" @slideInTop @slideOutTop>
            <mat-icon class="absolute ml-6 sm:ml-8" [svgIcon]="'heroicons_outline:magnifying-glass'"></mat-icon>
            <input
                class="h-full w-full px-16 sm:px-18"
                [formControl]="searchControl"
                [matAutocomplete]="matAutocomplete"
                [placeholder]="'Jump to a page…'"
                (keydown)="onKeydown($event)"
                #barSearchInput
            />
            <mat-autocomplete
                class="max-h-128 rounded-b border-t shadow-md sm:px-2"
                [disableRipple]="true"
                (optionSelected)="goTo($event.option.value)"
                #matAutocomplete="matAutocomplete"
            >
                <ng-container *ngTemplateOutlet="optionList"></ng-container>
            </mat-autocomplete>
            <button
                class="absolute right-5 top-1/2 -mt-5 h-10 w-10 shrink-0 sm:right-7"
                mat-icon-button
                aria-label="Close search"
                (click)="close()"
            >
                <mat-icon [svgIcon]="'heroicons_outline:x-mark'"></mat-icon>
            </button>
        </div>
    }
}

<!-- Basic search -->
@if (appearance === 'basic') {
    <div class="w-full sm:min-w-80">
        <mat-form-field class="w-full" [subscriptSizing]="'dynamic'">
            <mat-icon matPrefix [svgIcon]="'heroicons_outline:magnifying-glass'"></mat-icon>
            <input
                matInput
                [formControl]="searchControl"
                [matAutocomplete]="matAutocomplete"
                [placeholder]="'Jump to a page…'"
                (keydown)="onKeydown($event)"
            />
        </mat-form-field>
        <mat-autocomplete
            class="mt-1 max-h-128 rounded"
            [disableRipple]="true"
            (optionSelected)="goTo($event.option.value)"
            #matAutocomplete="matAutocomplete"
        >
            <ng-container *ngTemplateOutlet="optionList"></ng-container>
        </mat-autocomplete>
    </div>
}

<!-- Shared result list: jump-to-page destinations -->
<ng-template #optionList>
    @if (results && !results.length) {
        <mat-option class="text-secondary pointer-events-none bg-transparent px-6 text-md">
            No matching pages
        </mat-option>
    }
    @for (r of results; track trackByFn($index, r)) {
        <mat-option class="px-6 text-md" [value]="r">
            <div class="flex items-center gap-3">
                @if (r.icon) {
                    <mat-icon class="icon-size-5" [svgIcon]="r.icon"></mat-icon>
                }
                <span>{{ r.title }}</span>
                @if (r.group) {
                    <span class="text-secondary text-sm">· {{ r.group }}</span>
                }
            </div>
        </mat-option>
    }
</ng-template>
