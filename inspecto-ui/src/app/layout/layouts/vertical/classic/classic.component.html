<!-- Loading bar -->
<gamma-loading-bar></gamma-loading-bar>

<!-- Navigation -->
<gamma-vertical-navigation
    class="dark bg-gray-900 print:hidden"
    [mode]="isScreenSmall ? 'over' : 'side'"
    [name]="'mainNavigation'"
    [navigation]="displayedNavigation"
    [opened]="!isScreenSmall"
>
    <!-- Navigation header hook -->
    <ng-container gammaVerticalNavigationContentHeader>
        <!-- Logo + caption + menu search -->
        <div class="flex flex-col p-6 pb-0">
            <!-- Logo -->
            <div class="flex items-center">
                <!-- Light version -->
                <img
                    class="w-30 dark:hidden"
                    [src]="branding.logoUrl()"
                    alt="Logo image"
                />
                <!-- Dark version -->
                <img
                    class="hidden w-30 dark:flex"
                    [src]="branding.logoUrl()"
                    alt="Logo image"
                />
            </div>

            <!-- Caption -->
            <p class="mt-1.5 text-base italic text-primary-300">{{ branding.caption() }}</p>

            <!-- Menu search box (pure client-side filter of the nav tree) -->
            <div class="relative mt-4">
                <mat-icon
                    class="icon-size-5 pointer-events-none absolute left-2 top-1/2 -translate-y-1/2 text-gray-400"
                    [svgIcon]="'heroicons_outline:magnifying-glass'"
                ></mat-icon>
                <input
                    #navSearchInput
                    type="text"
                    role="searchbox"
                    aria-label="Search menu items"
                    placeholder="Search menu…"
                    class="w-full rounded-md bg-gray-800 py-2 pl-9 pr-9 text-sm text-gray-100 placeholder:text-gray-400 focus:outline-none focus-visible:ring-2 focus-visible:ring-white/30"
                    [value]="navSearchQuery"
                    (input)="onNavSearch(navSearchInput.value)"
                    (keydown.escape)="clearNavSearch()"
                    (keydown.enter)="goToFirstResult()"
                />
                @if (navSearchActive) {
                    <button
                        type="button"
                        class="absolute right-1 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-200"
                        aria-label="Clear menu search"
                        (click)="clearNavSearch()"
                    >
                        <mat-icon class="icon-size-5" [svgIcon]="'heroicons_outline:x-mark'"></mat-icon>
                    </button>
                }
            </div>
            @if (navSearchActive && displayedNavigation.length === 0) {
                <p class="mt-2 text-sm text-gray-400">No matching menus.</p>
            }
        </div>
    </ng-container>
</gamma-vertical-navigation>

<!-- Wrapper -->
<div class="flex w-full min-w-0 flex-auto flex-col">
    <!-- Header -->
    <div
        class="bg-card relative z-49 flex h-16 w-full flex-0 items-center px-4 shadow dark:border-b dark:bg-transparent dark:shadow-none md:px-6 print:hidden"
    >
        <!-- Navigation toggle button -->
        <button mat-icon-button aria-label="Toggle navigation" (click)="toggleNavigation('mainNavigation')">
            <mat-icon [svgIcon]="'heroicons_outline:bars-3'"></mat-icon>
        </button>
        <!-- Components -->
        <div class="ml-auto flex items-center space-x-0.5 pl-2 sm:space-x-2">
            <inspecto-lens-switcher></inspecto-lens-switcher>
            <inspecto-space-switcher></inspecto-space-switcher>
            <inspecto-notification-bell></inspecto-notification-bell>
            <search [appearance]="'bar'" [commands]="paletteCommands"></search>
            <user></user>
        </div>
    </div>

    <!-- Content -->
    <div class="flex flex-auto flex-col ">
        <!-- *ngIf="true" hack is required here for router-outlet to work correctly.
             Otherwise, layout changes won't be registered and the view won't be updated! -->
        @if (true) {
            <router-outlet></router-outlet>
        }
    </div>

    <!-- Footer -->
    <div
        class="bg-card relative z-49 flex h-14 w-full flex-0 items-center justify-start border-t px-4 dark:bg-transparent md:px-6 print:hidden"
    >
        <span class="text-secondary font-medium"
            >{{ branding.footerText() }} {{currentYear}}</span
        >
    </div>
</div>
