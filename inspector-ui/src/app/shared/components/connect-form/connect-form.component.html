<form class="connect-form" (submit)="onSubmit($event)">
  <dx-form [(formData)]="formData" [disabled]="loading" [showColonAfterLabel]="false">
    <dxi-item dataField="controlToken" editorType="dxTextBox"
      [editorOptions]="{ stylingMode: 'filled', mode: 'password', placeholder: 'Control token' }">
      <dxo-label text="Control token"></dxo-label>
    </dxi-item>
    <dxi-item dataField="assistToken" editorType="dxTextBox"
      [editorOptions]="{ stylingMode: 'filled', mode: 'password', placeholder: 'Assist token (optional)' }">
      <dxo-label text="Assist token (optional)"></dxo-label>
    </dxi-item>
  </dx-form>

  <dx-button class="connect-button" text="Connect" type="default" width="100%"
    [useSubmitBehavior]="true" [disabled]="loading"></dx-button>

  <p class="hint">
    Paste the token(s) configured on the server (<code>-Dcontrol.token</code> /
    <code>-Dassist.read.token</code>). A control token unlocks the full console; an assist token alone
    enables the catalog and AI assist. Tokens are kept only for this browser session.
  </p>
</form>
