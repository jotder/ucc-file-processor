name: branch-policy

# Un-bypassable backstop for the branch/release policy (docs/BRANCHING.md).
# Local git hooks can be skipped with --no-verify; CI cannot.
on:
  push:
  pull_request:

jobs:
  branch-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Reject retired / EOL branches (1.x, 2.x, 3.x)
        run: |
          RETIRED="1.x 2.x 3.x"
          # push -> the pushed branch; PR -> the base (target) branch
          ref="${{ github.event_name == 'pull_request' && github.base_ref || github.ref_name }}"
          for r in $RETIRED; do
            if [ "$ref" = "$r" ]; then
              echo "::error::'$ref' is retired/EOL (docs/BRANCHING.md). No CI, PRs, or releases on 1.x/2.x/3.x."
              exit 1
            fi
          done
          echo "branch '$ref' is supported."

  commit-lint:
    # Conventional Commits on the commits a PR would merge.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Lint commit subjects (Conventional Commits)
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          re='^(feat|fix|chore|docs|refactor|test|build|ci|perf|style|revert)(\([a-z0-9._/-]+\))?!?: .+'
          fail=0
          for sha in $(git rev-list "$base..$head"); do
            # skip merge commits
            if [ "$(git rev-list --no-walk --merges --count "$sha")" = "1" ]; then continue; fi
            subj=$(git log -1 --format=%s "$sha")
            if printf '%s' "$subj" | grep -qE "$re"; then
              echo "ok: $subj"
            else
              echo "::error::non-conventional commit subject: $subj"
              fail=1
            fi
          done
          exit $fail
