name: CI

# Runs the test suite on every push and pull request so regressions land at
# review time instead of in production. Keep this workflow lean — there's one
# Maven module and the full suite finishes in ~10 seconds.

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '24'
          cache: maven

      - name: Run tests
        working-directory: file-processor
        run: mvn --batch-mode --no-transfer-progress test

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: file-processor/target/surefire-reports/

  package:
    # Build the fat JAR on every push to a tag so v1.x.x tags get a downloadable
    # artifact attached to the release. PRs and branch pushes skip this step.
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '24'
          cache: maven

      - name: Package fat JAR
        working-directory: file-processor
        run: mvn --batch-mode --no-transfer-progress package -DskipTests

      - name: Upload fat JAR
        uses: actions/upload-artifact@v4
        with:
          name: file-processor-jar
          path: file-processor/target/file-processor-*.jar
