name: CI

# Runs the test suite on every push and pull request so regressions land at
# review time instead of in production. The build is a two-module Maven reactor
# (core engine + optional assist agent); the full suite finishes in ~30 seconds.

on:
  push:
    branches: [master, main, 3.x, 4.x]
    tags: ['v*']
  pull_request:
    branches: [master, main, 3.x, 4.x]

# Default GITHUB_TOKEN perms, narrowed: read the repo + read agent-kernel's published Maven packages.
permissions:
  contents: read
  packages: read

jobs:
  test:
    runs-on: ubuntu-latest
    # Consumed by the settings.xml below so Maven can authenticate to GitHub Packages. Public packages
    # still require an authenticated token to download — GITHUB_TOKEN (packages: read) is sufficient.
    env:
      GH_PKG_ACTOR: ${{ github.actor }}
      GH_PKG_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      # The optional file-processor-agent module depends on agent-kernel 1.0.0, now published to GitHub
      # Packages (the kernel's release workflow). Resolve it from there instead of building from source:
      # a CI-only settings.xml adds the agent-kernel Maven repo + token auth, leaving the consumer POMs
      # clean (local dev still resolves the kernel from ~/.m2). Only com.gamma.agentkernel.* artifacts come
      # from this repo; everything else still resolves from Maven Central.
      - name: Configure GitHub Packages auth (agent-kernel)
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<'EOF'
          <settings>
            <servers>
              <server>
                <id>github-agent-kernel</id>
                <username>${env.GH_PKG_ACTOR}</username>
                <password>${env.GH_PKG_TOKEN}</password>
              </server>
            </servers>
            <profiles>
              <profile>
                <id>github-agent-kernel</id>
                <repositories>
                  <repository>
                    <id>github-agent-kernel</id>
                    <url>https://maven.pkg.github.com/jotder/agent-kernel</url>
                    <releases><enabled>true</enabled></releases>
                    <snapshots><enabled>false</enabled></snapshots>
                  </repository>
                </repositories>
              </profile>
            </profiles>
            <activeProfiles>
              <activeProfile>github-agent-kernel</activeProfile>
            </activeProfiles>
          </settings>
          EOF

      # Build the whole reactor from the root POM so the optional agent module and
      # the cross-module AssistAgent SPI wiring are exercised, not just the core.
      # agent-kernel 1.0.0 resolves from GitHub Packages via the settings.xml above.
      - name: Run tests
        run: mvn --batch-mode --no-transfer-progress test

      # Boundary law (U1): the lean ETL core never gains a kernel dependency. Kernel types live
      # ONLY in the optional file-processor-agent module, behind the AssistAgent SPI. This guard
      # makes that enforceable, not aspirational — it fails the build if a com.gamma.agentkernel
      # reference ever leaks into the lean core's sources or its resolved dependency tree.
      - name: Guard — lean core stays kernel-free
        run: |
          if grep -rEl "com\.gamma\.agentkernel" inspecto/src; then
            echo "::error::lean core (file-processor) must not reference com.gamma.agentkernel"; exit 1
          fi
          if mvn --batch-mode --no-transfer-progress -pl inspecto dependency:tree | grep -E "com\.gamma\.agentkernel"; then
            echo "::error::lean core (file-processor) must not depend on agent-kernel"; exit 1
          fi
          echo "OK: file-processor is kernel-free (sources + dependency tree)"

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: '**/target/surefire-reports/'

# Note: CI does not build or store the fat JAR. It is ~90 MB (almost entirely
# DuckDB's per-platform native binaries) and would bloat Actions artifact
# storage on every tag for no benefit — the downloadable release JAR is built
# locally and attached to the GitHub release at cut time (see the release flow),
# not produced here.
