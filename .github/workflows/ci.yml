name: CI

# Runs the test suite on every push and pull request so regressions land at
# review time instead of in production. The build is a two-module Maven reactor
# (core engine + optional assist agent); the full suite finishes in ~30 seconds.

on:
  push:
    branches: [master, main, 3.x, 4.x]
    tags: ['v*']
  pull_request:
    branches: [master, main, 3.x, 4.x]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      # Build the whole reactor from the root POM so the optional agent module and
      # the cross-module AssistAgent SPI wiring are exercised, not just the core.
      - name: Run tests
        run: mvn --batch-mode --no-transfer-progress test

      # Boundary law (U1): the lean ETL core never gains a kernel dependency. Kernel types live
      # ONLY in the optional file-processor-agent module, behind the AssistAgent SPI. This guard
      # makes that enforceable, not aspirational — it fails the build if a com.gamma.agentkernel
      # reference ever leaks into the lean core's sources or its resolved dependency tree.
      - name: Guard — lean core stays kernel-free
        run: |
          if grep -rEl "com\.gamma\.agentkernel" file-processor/src; then
            echo "::error::lean core (file-processor) must not reference com.gamma.agentkernel"; exit 1
          fi
          if mvn --batch-mode --no-transfer-progress -pl file-processor dependency:tree | grep -E "com\.gamma\.agentkernel"; then
            echo "::error::lean core (file-processor) must not depend on agent-kernel"; exit 1
          fi
          echo "OK: file-processor is kernel-free (sources + dependency tree)"

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: '**/target/surefire-reports/'

# Note: CI does not build or store the fat JAR. It is ~90 MB (almost entirely
# DuckDB's per-platform native binaries) and would bloat Actions artifact
# storage on every tag for no benefit — the downloadable release JAR is built
# locally and attached to the GitHub release at cut time (see the release flow),
# not produced here.
