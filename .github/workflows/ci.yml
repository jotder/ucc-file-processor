name: CI

# Runs the test suite on every push and pull request so regressions land at
# review time instead of in production. The build is a two-module Maven reactor
# (core engine + optional assist agent); the full suite finishes in ~30 seconds.

on:
  push:
    branches: [master, main, 3.x, 4.x]
    tags: ['v*']
  pull_request:
    branches: [master, main, 3.x, 4.x]

# Default GITHUB_TOKEN perms, narrowed to just reading this repo — eoiagent is built from source
# below, so no GitHub Packages auth is needed here.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Canonical-vocabulary guard: user-facing docs must not use ⛔ banned synonyms (Flow, Data
      # Store, Collector-as-noun) or the Measure/Metric confusion (docs/GLOSSARY.md). Pure Node
      # (preinstalled on the runner), fast — fails early before the heavier steps.
      - name: Guard — canonical vocabulary in user-facing docs
        run: node tools/check-vocabulary.mjs

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      # The optional file-processor-agent module now depends on eoiagent (com.eoiagent:*:0.1.0-SNAPSHOT),
      # which replaced the discontinued agent-kernel. eoiagent is pre-release and not yet published to
      # GitHub Packages, so CI checks out its source (public repo jotder/inspect-agent) and installs it
      # into the runner's local ~/.m2 — the same thing a local dev does by hand. Once eoiagent cuts a
      # 0.1.0 release and starts publishing to GitHub Packages, swap this for a settings.xml repo/auth
      # step like the old agent-kernel one (see git history) and drop this checkout+build.
      - name: Checkout eoiagent (jotder/inspect-agent, pre-release — no packages yet)
        uses: actions/checkout@v4
        with:
          repository: jotder/inspect-agent
          path: eoiagent-src

      - name: Build & install eoiagent into local .m2
        run: mvn --batch-mode --no-transfer-progress -DskipTests install
        working-directory: eoiagent-src

      # Build the whole reactor from the root POM so the optional agent module and
      # the cross-module AssistAgent SPI wiring are exercised, not just the core.
      # eoiagent resolves from the local .m2 build above.
      - name: Run tests
        run: mvn --batch-mode --no-transfer-progress test

      # Boundary law (U1): the lean ETL core never gains a kernel dependency. Kernel types live
      # ONLY in the optional file-processor-agent module, behind the AssistAgent SPI. This guard
      # makes that enforceable, not aspirational — it fails the build if a com.gamma.agentkernel
      # reference ever leaks into the lean core's sources or its resolved dependency tree.
      - name: Guard — lean core stays kernel-free
        run: |
          if grep -rEl "com\.gamma\.agentkernel" inspecto/src; then
            echo "::error::lean core (file-processor) must not reference com.gamma.agentkernel"; exit 1
          fi
          if mvn --batch-mode --no-transfer-progress -pl inspecto dependency:tree | grep -E "com\.gamma\.agentkernel"; then
            echo "::error::lean core (file-processor) must not depend on agent-kernel"; exit 1
          fi
          echo "OK: file-processor is kernel-free (sources + dependency tree)"

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: '**/target/surefire-reports/'

# Note: CI does not build or store the fat JAR. It is ~90 MB (almost entirely
# DuckDB's per-platform native binaries) and would bloat Actions artifact
# storage on every tag for no benefit — the downloadable release JAR is built
# locally and attached to the GitHub release at cut time (see the release flow),
# not produced here.
