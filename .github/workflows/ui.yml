name: UI

# Builds the Inspector operator console (inspector-ui/, the gamma-template Angular SPA:
# ag-Grid / Chart.js / AntV G6). Kept fully separate from the Java ci.yml: the Node toolchain
# never enters the Maven reactor. Path-filtered to inspector-ui/** so backend-only changes
# don't trigger a frontend build (and vice-versa).

on:
  push:
    branches: [master, main, 3.x, 4.x]
    paths: ['inspector-ui/**', '.github/workflows/ui.yml']
  pull_request:
    branches: [master, main, 3.x, 4.x]
    paths: ['inspector-ui/**', '.github/workflows/ui.yml']

permissions:
  contents: read

defaults:
  run:
    working-directory: inspector-ui

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: inspector-ui/package-lock.json

      # npm ci fails if package-lock.json is out of sync with package.json.
      - name: Install dependencies
        run: npm ci

      # Unit tests (Vitest via @angular/build:unit-test, jsdom); single run, no watch.
      # The guarded e2e backend smoke (src/e2e) self-skips without E2E_BASE_URL.
      - name: Unit tests
        run: npm run test:ci

      # Production build is the green gate (AOT type-check + bundle + budgets).
      # No dev-only fileReplacements, so one configuration covers both.
      - name: Build (production)
        run: npm run build
